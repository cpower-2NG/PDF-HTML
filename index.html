<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>演示文稿在线观看</title>
  <style>
    :root {
      --bg: #f2efe9;
      --card: rgba(255, 250, 244, 0.88);
      --text: #2a1e1e;
      --muted: #5c4d4d;
      --line: rgba(199, 154, 59, 0.28);
      --accent: #8b0016;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 28px 18px;
      background:
        linear-gradient(145deg, rgba(179, 0, 27, 0.08), transparent 38%),
        linear-gradient(335deg, rgba(199, 154, 59, 0.12), transparent 36%),
        var(--bg);
      color: var(--text);
      font-family: "Noto Sans CJK SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      backdrop-filter: blur(8px);
      box-shadow: 0 16px 40px rgba(38, 18, 12, 0.08);
    }

    h1, h2, p { margin: 0; }

    h1 { font-size: 30px; }
    h2 { font-size: 20px; margin-bottom: 10px; }
    p { color: var(--muted); line-height: 1.6; }

    .hero {
      min-height: 56vh;
      display: grid;
      align-items: end;
      padding: 0;
      overflow: hidden;
      position: relative;
      background:
        linear-gradient(180deg, rgba(19, 18, 17, 0.12), rgba(14, 11, 10, 0.52)),
        url('https://www.dmduav.com/uploads/image/20250408/e1c99954c9e6ac0283a19da973e72a0f.png') center center / cover no-repeat;
      border: 1px solid rgba(199, 154, 59, 0.22);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(139, 0, 22, 0.22), transparent 45%);
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      max-width: 720px;
      padding: 28px;
      color: #fff9ef;
      display: grid;
      gap: 14px;
    }

    .hero h1 {
      font-size: clamp(34px, 5vw, 62px);
      line-height: 1.05;
      margin: 0;
      text-shadow: 0 8px 20px rgba(0, 0, 0, 0.38);
    }

    .hero p {
      color: rgba(255, 249, 239, 0.92);
      max-width: 44ch;
      font-size: 18px;
      line-height: 1.6;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 20px;
      border-radius: 999px;
      border: 1px solid rgba(255, 249, 239, 0.4);
      background: rgba(139, 0, 22, 0.82);
      color: #fff9ef;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.18);
      letter-spacing: 0.02em;
    }

    .project-list {
      display: grid;
      gap: 12px;
    }

    .project-item {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px 18px;
      background: rgba(255, 252, 248, 0.7);
      text-decoration: none;
      color: var(--text);
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .project-item:hover {
      box-shadow: 0 6px 20px rgba(139, 0, 22, 0.12);
      border-color: rgba(139, 0, 22, 0.3);
    }

    .project-item .proj-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.35;
    }

    .project-item .proj-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 4px;
    }

    .proj-arrow {
      font-size: 20px;
      color: var(--accent);
      opacity: 0.6;
      flex-shrink: 0;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .tips {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .tips kbd {
      display: inline-block;
      background: rgba(42, 30, 30, 0.08);
      border: 1px solid rgba(42, 30, 30, 0.18);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 12px;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card hero">
      <div class="hero-inner">
        <h1>演示文稿在线观看</h1>
        <p>点击下方进入演示，支持全屏翻页，适合课堂、会议及个人学习使用。</p>
        <div class="hero-actions">
          <a class="button" href="generated-html/shenzhen-low-altitude-economy-xijinping-thought/03-slides.html">立即观看</a>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="section-title">全部演示文稿</div>
      <div class="project-list">
        <a class="project-item" href="generated-html/shenzhen-low-altitude-economy-xijinping-thought/03-slides.html">
          <div>
            <div class="proj-title">从"天空之城"到"经济高地"</div>
            <div class="proj-desc">深圳低空经济产业集聚与新质生产力实践剖析 · 16 页</div>
          </div>
          <span class="proj-arrow">›</span>
        </a>
      </div>
      <p class="tips">
        观看技巧：进入演示后点击右下角 <kbd>⛶</kbd> 全屏，使用 <kbd>↑</kbd> <kbd>↓</kbd> 方向键或鼠标滚轮翻页，按 <kbd>Esc</kbd> 退出全屏。
      </p>
    </section>
  </main>
</body>
</html>
